name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: xyiqq/cabinet-layout-designer

jobs:
  dockerhub:
    name: Build image and publish when credentials exist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve publish mode
        id: publish
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_XYIQQ: ${{ secrets.DOCKERHUB_XYIQQ }}
        run: |
          USERNAME="${DOCKERHUB_USERNAME:-xyiqq}"
          TOKEN="${DOCKERHUB_TOKEN:-$DOCKERHUB_XYIQQ}"
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          if [ -n "$USERNAME" ] && [ -n "$TOKEN" ]; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
            echo "Docker Hub credentials found. This run will publish the image."
          else
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker Hub secrets are not configured. This run will build the image without pushing it."
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.publish.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ steps.publish.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_XYIQQ }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build image without publishing
        if: steps.publish.outputs.can_push != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image
        if: steps.publish.outputs.can_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        run: |
          if [ "${{ steps.publish.outputs.can_push }}" = "true" ]; then
            echo "Published image tags:" >> "$GITHUB_STEP_SUMMARY"
            echo '${{ steps.meta.outputs.tags }}' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Docker image build completed without publishing." >> "$GITHUB_STEP_SUMMARY"
            echo "Add DOCKERHUB_TOKEN or DOCKERHUB_XYIQQ repository secret, then rerun this workflow to publish." >> "$GITHUB_STEP_SUMMARY"
          fi
