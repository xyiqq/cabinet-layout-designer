name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: xyiqq/cabinet-layout-designer

jobs:
  resolve:
    name: Resolve Docker publishing mode
    runs-on: ubuntu-latest
    outputs:
      can_push: ${{ steps.publish.outputs.can_push }}
      username: ${{ steps.publish.outputs.username }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Resolve publish mode
        id: publish
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_XYIQQ: ${{ secrets.DOCKERHUB_XYIQQ }}
        run: |
          USERNAME="${DOCKERHUB_USERNAME:-xyiqq}"
          TOKEN="${DOCKERHUB_TOKEN:-$DOCKERHUB_XYIQQ}"
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          if [ -n "$USERNAME" ] && [ -n "$TOKEN" ]; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
            echo "Docker Hub credentials found. This run will publish the image."
          else
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker Hub secrets are not configured. This run will build images without pushing them."
          fi

      - name: Resolve tag variables
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.suffix }} image
    needs: resolve
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - suffix: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: needs.resolve.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ needs.resolve.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_XYIQQ }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest-${{ matrix.suffix }},enable={{is_default_branch}}
            type=sha,prefix=sha-,suffix=-${{ matrix.suffix }}
            type=ref,event=tag,suffix=-${{ matrix.suffix }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ needs.resolve.outputs.can_push == 'true' }}
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

  manifest:
    name: Publish multi-architecture manifest
    needs:
      - resolve
      - build
    if: needs.resolve.outputs.can_push == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ needs.resolve.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_XYIQQ }}

      - name: Create manifest tags
        env:
          SHORT_SHA: ${{ needs.resolve.outputs.short_sha }}
        run: |
          docker buildx imagetools create \
            -t "$IMAGE_NAME:sha-$SHORT_SHA" \
            "$IMAGE_NAME:sha-$SHORT_SHA-amd64" \
            "$IMAGE_NAME:sha-$SHORT_SHA-arm64"

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            docker buildx imagetools create \
              -t "$IMAGE_NAME:latest" \
              "$IMAGE_NAME:latest-amd64" \
              "$IMAGE_NAME:latest-arm64"
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            docker buildx imagetools create \
              -t "$IMAGE_NAME:$GITHUB_REF_NAME" \
              "$IMAGE_NAME:$GITHUB_REF_NAME-amd64" \
              "$IMAGE_NAME:$GITHUB_REF_NAME-arm64"
          fi

      - name: Publish summary
        env:
          SHORT_SHA: ${{ needs.resolve.outputs.short_sha }}
        run: |
          echo "Published Docker image manifests:" >> "$GITHUB_STEP_SUMMARY"
          echo "- $IMAGE_NAME:sha-$SHORT_SHA" >> "$GITHUB_STEP_SUMMARY"
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "- $IMAGE_NAME:latest" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "- $IMAGE_NAME:$GITHUB_REF_NAME" >> "$GITHUB_STEP_SUMMARY"
          fi
