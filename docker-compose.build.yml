services:
  cabinet-layout-designer:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-xyiqq/cabinet-layout-designer}:${IMAGE_TAG:-local}
    container_name: cabinet-layout-designer
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
